<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background: #f8f8f8;
    }

    /*  BACK BUTTON  */
    .back-btn {
      display: inline-block;
      font-size: 20px;
      font-weight: 700;
      color: #d4af37;
      text-decoration: none;
      padding: 10px 18px;
      border: 2px solid #d4af37;
      border-radius: 10px;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #d4af37;
      color: white;
    }

    /*  CARDS  */
    .card-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    /*  FORM  */
    .checkout-box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .title {
      font-weight: 700;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<!--  BACK BUTTON  -->
<div class="container py-3">
  <a href="index.html" class="back-btn">
    ← BACK
  </a>
</div>

<!--  CONTENT  -->
<div class="container pb-5">

  <h2 class="fw-bold mb-4">Your Order</h2>

  <!-- CART -->
  <div id="cart-table-container" class="card-box mb-4"></div>

  <!-- CHECKOUT -->
  <div class="checkout-box">

    <h5 class="title">Checkout Details</h5>

    <input id="name" class="form-control mb-2" placeholder="Full Name" required>
    <input id="phone" class="form-control mb-2" placeholder="Phone Number" required>
    <input id="address" class="form-control mb-2" placeholder="Address" required>

    <textarea id="notes" class="form-control mb-3" placeholder="Notes (optional)"></textarea>

    <button class="btn btn-warning w-100 fw-bold" onclick="confirmOrder()">
      Send Order to WhatsApp
    </button>

  </div>

</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>

<script>
  window.onload = displayCart;
</script>

</body>
</html>
